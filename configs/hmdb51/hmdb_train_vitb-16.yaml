resume: 
pretrain: 
seed: 1024
data:
    dataset: hmdb51
    modality: video
    num_segments: 32
    seg_length: 1       # no use
    batch_size: 32
    workers: 8
    num_classes: 51
    image_tmpl: 'img_{:05d}.jpg' # no used
    train_root: '/path/to/dataset'
    train_list: 'lists/hmdb51/trainlist_split3.txt'
    val_root: '/path/to/dataset'
    val_list: 'lists/hmdb51/vallist_split3.txt'
    label_list: 'lists/hmdb51/hmdb51_labels.csv'
    input_size: 224
    random_shift: True
    index_bias: 1
    output_path: /path/to/output
network:
    arch: ViT-B/16     #ViT-B/32 ViT-B/16
    init: True
    tm: False           # no use
    drop_out: 0.0
    emb_dropout: 0.0
    sim_header: Transf  # [Transf, None] 'Transf'：6-layer temporal transformer  'None': mean temporal pooling
    interaction: DP     # [DP] 'DP': mean temporal pooling
    joint_st: False     # whether use joint space-time attention in the transformer (default: False)
    drop: 0      
    temporal_layer: 6
    num_experts: 4      #  >1: MoTE; <=1: mlp
    sampling_rates: [2, 4, 8, 16]  # sampling rates for each expert
    readout_fuse_type: linear # linear or mean
solver:
    type: cosine
    epochs: 30
    start_epoch: 0
    epoch_offset: 0
    optim: adamw
    lr: 5.e-5
    lr_warmup_step: 5
    weight_decay: 0.1
    loss_type: CE
    evaluate: False     # only run evaluation
    clip_ratio: 0.06
    grad_accumulation_steps: 1
logging:
    print_freq: 10
    eval_freq: 1